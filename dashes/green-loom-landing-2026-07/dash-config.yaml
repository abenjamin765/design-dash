# Dash Configuration
# One file per Design Dash.
# Governs tier, mandatory gates, and default thresholds for this dash.
# Do NOT edit mid-dash to lower the tier — promotion is allowed, demotion is not.

# --- Dash identity ---
dash-name: "Green Loom Landing Page"
dash-id: "green-loom-landing-2026-07"
owner: "Aaron"
start-date: "2026-07-10"
workspace: "dashes/green-loom-landing-2026-07"

# --- Tier classification ---
tier: "high-stakes"
computed-tier-rationale: "Email signup form = regulated PII surface (GDPR/CCPA) → high-stakes (+ Privacy gate). Reach <500 and reversible page would otherwise be Express; PII trigger wins."
tier-confirmed-by: ""   # A-001 debt: rule requires NON-author reviewer; author offered to self-review — not permitted. Peer review due 2026-08-10.
tier-confirmation-date: ""
